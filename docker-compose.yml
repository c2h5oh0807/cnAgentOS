services:
  mysql:
    image: mysql:8.0
    container_name: cnagentos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass_here
      MYSQL_DATABASE: cnagentos
      MYSQL_USER: cnagentos
      MYSQL_PASSWORD: cnagentos_pass_here
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
