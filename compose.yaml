services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: cnagentos
      POSTGRES_USER: cnagentos
      POSTGRES_PASSWORD: cnagentos_dev
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cnagentos -d cnagentos"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - cnagentos-postgres-18:/var/lib/postgresql

volumes:
  cnagentos-postgres-18:
